---
ansible_user: ivan-shnurchenko
ansible_group: staff
ansible_python_interpreter: /opt/homebrew/bin/python3
firefox_profile_dir: /Users/ivan-shnurchenko/Library/Application Support/Firefox/Profiles/vfxfh9r4.default-release

pi_plannotator_planning_model:
  provider: "anthropic"
  id: "claude-opus-4-6"
pi_plannotator_planning_thinking: "xhigh"
pi_plannotator_executing_model:
  provider: "anthropic"
  id: "claude-sonnet-4-6"
pi_plannotator_executing_thinking: "medium"
pi_plannotator_reviewing_model:
  provider: "anthropic"
  id: "claude-opus-4-6"
pi_plannotator_reviewing_thinking: "xhigh"

pi_agent_subagent_overrides:
  subagents:
    agentOverrides:
      context-builder:
        thinking: "low"
      delegate:
        thinking: "low"
      env-scout:
        thinking: "low"
      gh-researcher:
        thinking: "low"
      linear-researcher:
        thinking: "low"
      oracle:
        model: "anthropic/claude-opus-4-6"
        thinking: "high"
      planner:
        model: "anthropic/claude-opus-4-6"
        thinking: "xhigh"
      researcher:
        thinking: "medium"
      reviewer:
        model: "anthropic/claude-opus-4-6"
        thinking: "high"
      scout:
        model: "anthropic/claude-sonnet-4-6"
        thinking: "low"
      worker:
        model: "anthropic/claude-sonnet-4-6"
        thinking: "medium"

pi_agent_mcp_servers:
  context-mode:
    command: "context-mode"
  context7:
    type: "streamable-http"
    url: "https://mcp.context7.com/mcp"
  new-relic:
    type: "http"
    url: "https://mcp.eu.newrelic.com/mcp/"
    headers:
      Api-Key: "{{ vault_new_relic_api_key }}"

# Work-specific packages, appended to the global pi_agent_settings_packages list
pi_agent_settings_extra_packages:
  - "npm:@fink-andreas/pi-linear-tools"
