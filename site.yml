---
- name: "Install the whole environment for the OSX"
  hosts: all
  connection: local
  gather_facts: true
  tasks:
    - name: Untap unused/untrusted third-party taps
      community.general.homebrew_tap:
        state: absent
        name: "{{ item }}"
      loop:
        - anomalyco/tap
        - brewforge/extras
        - derailed/k9s
        - hashicorp/tap
        - jesseduffield/lazygit
        - oven-sh/bun
        - sdkman/tap
        - sst/tap
        - theboredteam/boring-notch
      ignore_errors: true

    - name: Install Homebrew taps
      community.general.homebrew_tap:
        state: present
        name: "{{ homebrew_taps }}"
      when: homebrew_taps | length > 0

    - name: Update Homebrew
      community.general.homebrew:
        update_homebrew: true
        upgrade_all: true

    - name: Install packages
      community.general.homebrew:
        name: "{{ homebrew_packages }}"
        state: latest

    - name: Install casks
      community.general.homebrew_cask:
        state: latest
        name: "{{ homebrew_casks }}"

    - name: "Copy configs"
      ansible.builtin.include_role:
        name: config_files
      vars:
        config_files_items: "{{ config_files }}"

    - name: "Configure Git"
      ansible.builtin.include_role:
        name: git

    - name: "Create mise conf.d directory"
      ansible.builtin.file:
        path: "~/.config/mise/conf.d"
        state: directory
        mode: '0700'

    - name: "Generate worktrunk shell integration"
      ansible.builtin.command: wt config shell init zsh
      register: wt_shell_init
      changed_when: false

    - name: "Write worktrunk shell integration to ~/.zshrc.worktrunk"
      ansible.builtin.copy:
        content: "{{ wt_shell_init.stdout }}\n"
        dest: "~/.zshrc.worktrunk"
        mode: '0600'

    - name: "Install and configure Pi agent"
      ansible.builtin.include_role:
        name: pi_agent

  post_tasks:
    - name: "Upgrade mise-managed tools"
      ansible.builtin.command: mise upgrade
      changed_when: true

    - name: "Update Pi extensions"
      ansible.builtin.command: pi update --extensions
      changed_when: true
