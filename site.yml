---
- name: "Install the whole environment for the OSX"
  hosts: all
  connection: local
  gather_facts: true
  tasks:
    - name: Install Homebrew taps
      community.general.homebrew_tap:
        state: present
        name: "{{ homebrew_taps }}"

    - name: Update Homebrew
      community.general.homebrew:
        update_homebrew: true
        upgrade_all: true

    - name: Install packages
      community.general.homebrew:
        name: "{{ homebrew_packages }}"
        state: latest

    - name: Install casks
      community.general.homebrew_cask:
        state: latest
        name: "{{ homebrew_casks }}"

    - name: "Copy configs"
      tags: configs
      ansible.builtin.include_role:
        name: cp
      vars:
        cp_entity_source: "{{ item.src }}"
        cp_entity_destination: "{{ item.dest }}"
        cp_entity_name: "{{ item.name }}"
        cp_entity_permissions: "0600"
      loop: "{{ config_files }}"

    - name: "Ensure global gitignore file exists"
      tags: configs
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.gitignore_global"
        state: touch
        mode: '0600'

    - name: "Ensure global gitignore entries are present"
      tags: configs
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.gitignore_global"
        line: "{{ item }}"
        state: present
      loop:
        - "PLAN.md"
        - ".idea"
        - ".run"
        - "tmp"

    - name: "Configure Git global excludes file"
      tags: configs
      community.general.git_config:
        name: core.excludesfile
        scope: global
        value: "{{ ansible_env.HOME }}/.gitignore_global"

    - name: "Create mise conf.d directory"
      tags: configs
      ansible.builtin.file:
        path: "~/.config/mise/conf.d"
        state: directory
        mode: '0700'

    - name: "Generate worktrunk shell integration"
      tags: configs
      ansible.builtin.command: wt config shell init zsh
      register: wt_shell_init
      changed_when: false

    - name: "Write worktrunk shell integration to ~/.zshrc.worktrunk"
      tags: configs
      ansible.builtin.copy:
        content: "{{ wt_shell_init.stdout }}\n"
        dest: "~/.zshrc.worktrunk"
        mode: '0600'
